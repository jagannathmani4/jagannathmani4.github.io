<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe. Fashion</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">Luxe.<span>FASHION</span></a>
            <div class="d-flex align-items-center ms-auto gap-3">
                <a href="login.html" id="auth-link" class="text-dark text-decoration-none">👤 Login</a>
                <a href="cart.html" class="text-dark text-decoration-none position-relative">
                    🛒 <span id="cart-count" class="badge bg-danger rounded-pill cart-badge">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <header class="hero-section text-center py-5">
        <div class="container py-5">
            <h1 class="display-4 fw-bold">Discover Your Style.</h1>
            <p class="lead text-muted">Premium quality fashion for modern lifestyles.</p>
        </div>
    </header>

    <!-- Product Grid -->
    <section class="container py-5">
        <h2 class="mb-4">New Arrivals</h2>
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="product-grid">
            <div class="col w-100 text-center"><div class="spinner-border text-dark" role="status"></div></div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
