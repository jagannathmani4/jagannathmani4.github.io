<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Store - Luxe.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <!-- Updated Navbar with Logout & Dynamic Logo -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 dynamic-logo" href="index.html">Luxe.<span>FASHION</span></a>
            
            <div class="d-flex align-items-center ms-auto gap-3">
                <a href="login.html" id="auth-link" class="text-dark text-decoration-none fw-bold">👤 Login</a>
                <a href="#" id="store-logout-btn" class="text-danger text-decoration-none fw-bold d-none">Log Out</a>
                
                <a href="cart.html" class="text-dark position-relative text-decoration-none fs-5">
                    🛒 <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.65em;">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="py-5 text-center bg-white border-bottom">
        <div class="container py-5">
            <h1 class="display-4 fw-bold">Discover Your Style.</h1>
            <p class="lead text-muted">Premium quality fashion for modern lifestyles.</p>
        </div>
    </header>

    <!-- Product Grid -->
    <main class="container py-5">
        <h3 class="fw-bold mb-4">New Arrivals</h3>
        <div id="product-grid" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            <div class="col w-100 text-center py-5">
                <div class="spinner-border text-dark" role="status"></div>
            </div>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
