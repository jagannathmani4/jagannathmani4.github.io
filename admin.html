<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Luxe.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block admin-sidebar py-4 position-fixed">
                <a class="navbar-brand fw-bold fs-4 mb-5 d-block px-3" href="#">Luxe.<span>ADMIN</span></a>
                <ul class="nav flex-column gap-2 px-3">
                    <li class="nav-item">
                        <a class="nav-link text-dark fw-bold bg-light rounded" href="#">Inventory</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-muted" href="index.html">← Storefront</a>
                    </li>
                    <li class="nav-item mt-5">
                        <a class="nav-link text-danger fw-bold" href="#" id="logout-btn">Logout</a>
                    </li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 py-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-4 border-bottom">
                    <h1 class="h2 fw-bold">Inventory Management</h1>
                </div>
                
                <div class="table-responsive bg-white rounded shadow-sm p-3">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Image</th>
                                <th>Product Name</th>
                                <th>Price</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-list">
                            <!-- Items injected via JS -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
