<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cart - Luxe.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 dynamic-logo" href="index.html">Luxe.<span>FASHION</span></a>
            <div class="d-flex align-items-center ms-auto gap-3">
                <a href="index.html" class="btn btn-outline-dark btn-sm fw-bold">← Back to Shop</a>
            </div>
        </div>
    </nav>

    <!-- Cart Layout -->
    <div class="container py-5">
        <div class="row">
            <!-- Items Section -->
            <div class="col-lg-8" id="cart-items-container">
                <div class="text-center py-5"><div class="spinner-border text-dark" role="status"></div></div>
            </div>
            
            <!-- Checkout Summary & Location Check -->
            <div class="col-lg-4 mt-4 mt-lg-0">
                <div class="card border-0 shadow-sm p-4 sticky-top" style="top: 100px;">
                    <h4 class="fw-bold mb-4">Order Summary</h4>
                    <div class="d-flex justify-content-between mb-3">
                        <span class="text-muted">Subtotal</span>
                        <span id="cart-total" class="fw-bold fs-5">₹0.00</span>
                    </div>
                    
                    <hr>
                    
                    <!-- Step 1: Location & Details -->
                    <div id="checkout-step-1">
                        <div class="mb-3">
                            <label class="fw-bold mb-2">Full Delivery Address</label>
                            <textarea id="delivery-address" class="form-control p-3 bg-light border-0 mb-3" rows="3" placeholder="House/Flat No, Street Name, Landmark" required></textarea>
                            
                            <label class="fw-bold mb-2">PIN Code</label>
                            <input type="number" id="delivery-pincode" class="form-control p-3 bg-light border-0" placeholder="Enter 6-digit PIN" required>
                            <div id="location-msg" class="text-muted small mt-2">Enter address details to proceed.</div>
                        </div>
                        <button id="generate-qr-btn" class="btn btn-dark w-100 py-3 fw-bold mt-2">Proceed to Payment</button>
                    </div>

                    <!-- Step 2: Payment Section (Hidden initially) -->
                    <div id="payment-section" class="d-none">
                        <div class="text-center mb-3">
                            <h5 class="fw-bold text-success mb-3">Scan to Pay ₹<span id="pay-amount"></span></h5>
                            <!-- Dynamic QR Code will appear here -->
                            <img id="upi-qr-code" src="" alt="UPI QR Code" class="img-fluid border p-2 rounded mb-3" style="max-width: 200px;">
                            <p class="small text-muted mb-3">Pay using GPay, PhonePe, or Paytm</p>
                        </div>
                        
                        <label class="fw-bold mb-2">
                            Enter UTR / Reference Number <span class="text-danger fs-5">*</span>
                        </label>
                        <input type="text" id="utr-number" class="form-control p-3 bg-light border-0 mb-3" placeholder="e.g. 312345678901" required>
                        <button id="confirm-order-btn" class="btn btn-success w-100 py-3 fw-bold">Done (Place Order)</button>
                        <button id="cancel-payment-btn" class="btn btn-outline-danger w-100 py-2 fw-bold mt-2">Cancel</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/cart.js"></script>
</body>
</html>
