<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart - Luxe.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-light bg-white border-bottom py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">Luxe.<span>FASHION</span></a>
            <a href="index.html" class="btn btn-outline-dark btn-sm">← Back to Shop</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-5">
            <!-- Cart Items -->
            <div class="col-lg-8" id="cart-items-container">
                <h2 class="mb-4">Shopping Cart</h2>
                <!-- JS will inject items here -->
            </div>

            <!-- Checkout Summary -->
            <div class="col-lg-4">
                <div class="card bg-light border-0 shadow-sm p-4">
                    <h3 class="card-title mb-4">Order Summary</h3>
                    <div class="d-flex justify-content-between mb-4 fs-5 fw-bold">
                        <span>Total:</span>
                        <span id="cart-total">$0.00</span>
                    </div>
                    
                    <h5 class="mb-3">Payment Method</h5>
                    <div class="btn-group w-100 mb-3" role="group">
                        <input type="radio" class="btn-check" name="payment" id="card" checked>
                        <label class="btn btn-outline-dark" for="card">💳 Card</label>
                        <input type="radio" class="btn-check" name="payment" id="paypal">
                        <label class="btn btn-outline-dark" for="paypal">🔵 PayPal</label>
                    </div>
                    
                    <input type="text" class="form-control mb-3" placeholder="Card Number">
                    <button class="btn btn-dark w-100 py-2 fw-bold" id="checkout-btn">Complete Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/cart.js"></script>
</body>
</html>
