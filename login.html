<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication - Luxe.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center bg-light" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm border-0 p-4 text-center">
                    
                    <!-- ================= LOGIN FORM (Default) ================= -->
                    <div id="login-container">
                        <h2 class="fw-bold mb-4">Welcome Back</h2>
                        <form id="login-form">
                            <div class="mb-3">
                                <input type="email" id="login-email" class="form-control p-3" placeholder="Email Address" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" id="login-password" class="form-control p-3" placeholder="Password" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-3 fw-bold">Sign In</button>
                        </form>
                        <p class="mt-4 mb-0 text-muted">No account? <a href="#" id="show-register" class="text-dark fw-bold">Register</a></p>
                    </div>

                    <!-- ================= REGISTER FORM (Hidden by default) ================= -->
                    <div id="register-container" class="d-none">
                        <h2 class="fw-bold mb-4">Create Account</h2>
                        <form id="register-form">
                            <div class="mb-3">
                                <input type="text" id="reg-name" class="form-control p-3" placeholder="Full Name" required>
                            </div>
                            <div class="mb-3">
                                <input type="email" id="reg-email" class="form-control p-3" placeholder="Email Address" required>
                            </div>
                            <div class="mb-4">
                                <input type="password" id="reg-password" class="form-control p-3" placeholder="Password (min 6 chars)" required>
                            </div>
                            <button type="submit" class="btn btn-dark w-100 py-3 fw-bold">Register</button>
                        </form>
                        <p class="mt-4 mb-0 text-muted">Have an account? <a href="#" id="show-login" class="text-dark fw-bold">Sign In</a></p>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
